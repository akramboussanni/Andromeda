name: Gather Releases

on:
  release:
    types: [published]

jobs:
  gather-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to upload assets to the release
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest Andromeda.Installer and Andromeda.Mod Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading latest release of Andromeda.Installer..."
          gh release download --repo akramboussanni/Andromeda.Installer --dir installer_assets --pattern "*" || echo "No installer assets found or failed to download."
          
          echo "Downloading latest release of Andromeda.Mod..."
          gh release download --repo akramboussanni/Andromeda.Mod --dir mod_assets --pattern "*" || echo "No mod assets found or failed to download."

          echo "Inspecting downloaded files..."
          ls -la installer_assets/ || true
          ls -la mod_assets/ || true

      - name: Upload Assets to Current Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading installer assets..."
          for file in installer_assets/*; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "${{ github.event.release.tag_name }}" "$file" --clobber
            fi
          done
          
          echo "Uploading mod assets..."
          for file in mod_assets/*; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "${{ github.event.release.tag_name }}" "$file" --clobber
            fi
          done
